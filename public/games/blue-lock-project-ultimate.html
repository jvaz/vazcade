<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blue Lock: Project Ultimate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010103; font-family: 'Teko', sans-serif; touch-action: none; user-select: none; }
        #gameCanvas { display: block; width: 100%; height: 100%; transition: background-color 0.5s; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; flex-direction: column; justify-content: space-between; z-index: 20; }
        .hud-top { display: flex; justify-content: space-between; padding: 20px 40px; color: white; text-transform: uppercase; }
        .stats-panel { background: rgba(5, 5, 15, 0.85); border: 1px solid rgba(255,255,255,0.1); border-left: 4px solid #00e5ff; padding: 10px 25px; border-radius: 8px; display: flex; flex-direction: column; gap: 2px; }
        .char-hud-name { font-size: 16px; color: #888; letter-spacing: 2px; margin-bottom: -5px; }
        .score-container { font-size: 40px; font-weight: 700; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); letter-spacing: 2px; display: flex; align-items: center; gap: 20px; line-height: 1; }
        .ammo-container { font-size: 26px; color: #ddd; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; transition: color 0.2s; }
        .combo-container { font-size: 24px; color: #00ff66; text-shadow: 0 0 10px #00ff66; font-style: italic; opacity: 0; transition: all 0.3s; transform: translateY(-10px); }
        .show-combo { opacity: 1; transform: translateY(0); }
        .combo-shake { animation: shake 0.2s infinite; }
        .rank-container { font-size: 40px; font-weight: 700; color: #fff; text-shadow: 0 0 10px #ffaa00; font-style: italic; letter-spacing: 3px; transition: transform 0.3s; }
        .ego-panel { background: rgba(5, 5, 15, 0.85); border: 1px solid rgba(255,255,255,0.1); border-right: 4px solid #ff0033; padding: 15px 25px; border-radius: 8px; width: 180px; text-align: right; }
        .ego-text { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; letter-spacing: 2px; }
        .ego-bar-bg { width: 100%; height: 12px; background-color: #050505; border: 1px solid #333; border-radius: 6px; overflow: hidden; position: relative; }
        .ego-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #333, #fff); transition: width 0.2s ease, background 0.3s; }
        .ego-full { animation: flashWhite 0.5s infinite alternate; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(-2px, 1px) rotate(1deg); } }
        @keyframes flashWhite { from { box-shadow: 0 0 5px #fff; } to { box-shadow: 0 0 15px #fff, inset 0 0 10px #fff; } }
        #screens { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(3,3,15,0.95) 0%, rgba(0,0,5,1) 100%); z-index: 50; transition: background 0.5s; }
        .menu-container { display: flex; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .title { font-size: 90px; color: #fff; text-shadow: 0 0 20px #00e5ff; margin: 0; text-align: center; line-height: 1; letter-spacing: 8px; }
        .subtitle { font-size: 24px; color: #aaa; margin-bottom: 20px; letter-spacing: 6px; text-align: center; font-weight: 600; }
        .high-score-display { font-size: 20px; color: #ffdd00; margin-bottom: 20px; letter-spacing: 2px; }
        .btn { pointer-events: auto; background: linear-gradient(135deg, rgba(0,229,255,0.1) 0%, rgba(0,0,0,0.8) 100%); color: white; border: 2px solid #00e5ff; padding: 15px 50px; font-size: 28px; font-family: 'Teko', sans-serif; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; letter-spacing: 3px; border-radius: 4px; margin: 10px; }
        .btn:hover { background: rgba(0,229,255,0.2); border-color: #fff; transform: translateY(-3px); }
        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; margin-bottom: 10px; max-width: 600px; width: 90%; }
        .char-card { background: linear-gradient(to bottom, rgba(20,20,30,0.9), rgba(5,5,10,0.9)); border: 1px solid #333; border-radius: 8px; padding: 15px 5px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .char-name { font-size: 24px; font-weight: 700; color: #888; letter-spacing: 2px; }
        .char-card:hover { transform: scale(1.05) translateY(-5px); border-color: var(--hover-color, #fff); }
        .char-card:hover .char-name { color: #fff; text-shadow: 0 0 10px var(--hover-color); }
        #charQuote { height: 30px; color: #fff; font-size: 22px; font-style: italic; margin-bottom: 20px; transition: color 0.3s; }
        .flow-active-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #fff; opacity: 0; pointer-events: none; transition: opacity 0.4s; letter-spacing: 10px; font-style: italic; z-index: 15; }
        .show-flow { opacity: 1; animation: pulseFlow 0.8s infinite alternate; }
        @keyframes pulseFlow { 0% { transform: translate(-50%, -50%) scale(0.95); } 100% { transform: translate(-50%, -50%) scale(1.05); } }
        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 30; opacity: 0.3; }
        .mobile-controls { display: none; position: absolute; bottom: 30px; width: 100%; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 40; }
        .mobile-group { display: flex; gap: 15px; }
        .mobile-btn { pointer-events: auto; width: 70px; height: 70px; border-radius: 50%; background: rgba(5, 5, 15, 0.85); border: 2px solid rgba(255, 255, 255, 0.2); color: white; font-family: 'Teko', sans-serif; font-size: 20px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
        .mobile-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        .mobile-btn.shoot { border-color: #00e5ff; background: rgba(0, 229, 255, 0.1); }
        .btn-pause { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; border-radius: 5px; background: rgba(0,0,0,0.5); border: 1px solid #555; color: white; font-family: 'Teko'; font-size: 20px; cursor: pointer; pointer-events: auto; z-index: 45; }
        .flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; opacity: 0; z-index: 60; transition: opacity 0.3s ease-out; }
        .meta-sweep { position: absolute; top: -100%; left: 0; width: 100%; height: 200%; background: linear-gradient(to bottom, transparent, rgba(170,0,255,0.5), transparent); pointer-events: none; z-index: 55; opacity: 0; }
        .speed-lines { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s, background 0.3s; background: radial-gradient(ellipse at center, transparent 70%, rgba(255,255,255,0.05) 100%); }
        .danger-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 5px solid red; box-sizing: border-box; pointer-events: none; opacity: 0; z-index: 50; transition: opacity 0.2s; }
        #pauseMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }
        @media (max-width: 800px) {
            .char-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; max-width: 100%; } 
            .char-name { font-size: 18px; letter-spacing: 0px; }
            .mobile-controls { display: flex; } .title { font-size: 50px; } 
            .hud-top { padding: 15px; flex-direction: column; gap: 10px; } 
            .ego-panel { width: 150px; padding: 10px 15px; align-self: flex-end;}
            .stats-panel { padding: 10px 15px; }
            .score-container { font-size: 30px; }
            .rank-container { font-size: 30px; }
        }
    </style>
</head>
<body>
    <div id="flashOverlay" class="flash-overlay"></div>
    <div id="metaSweep" class="meta-sweep"></div>
    <div id="speedLines" class="speed-lines"></div>
    <div id="dangerBorder" class="danger-border"></div>
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>
    <div id="ui-layer">
        <div class="hud-top">
            <div class="stats-panel">
                <div class="char-hud-name" id="charHudName">ISAGI</div>
                <div class="score-container">
                    GOLOS: <span id="scoreVal" style="color:#fff;">0</span>
                    <span class="ammo-container" id="ammoUI"><span id="ammoIcon" style="color:#00e5ff; font-size:20px;">⚽</span> <span id="ammoCount">0</span>/6</span>
                    <span class="rank-container" id="rankUI">RANK D</span>
                </div>
                <div class="combo-container" id="comboText">COMBO AÉREO x2</div>
            </div>
            <button class="btn-pause" id="btnPauseTop">||</button>
            <div class="ego-panel">
                <div class="ego-text">EGO <span id="egoPercent">0%</span></div>
                <div class="ego-bar-bg"><div class="ego-bar-fill" id="egoBar"></div></div>
            </div>
        </div>
        <div class="mobile-controls">
            <div class="mobile-btn" id="btnSlide">DESLIZ</div>
            <div class="mobile-group">
                <div class="mobile-btn shoot" id="btnShoot">CHUTE</div>
                <div class="mobile-btn" id="btnJump">SALTO</div>
            </div>
        </div>
    </div>

    <div class="flow-active-text" id="flowText">ZONA</div>
    <div id="pauseMenu">
        <h1 class="title" style="font-size: 60px;">PAUSA</h1>
        <button class="btn" id="btnResume">Continuar</button>
        <button class="btn" id="btnQuitToMenu" style="border-color: #ff0033;">Abandonar</button>
    </div>
    <div id="screens">
        <div class="menu-container" id="mainMenu">
            <h1 class="title">BLUE LOCK</h1>
            <div class="subtitle">PROJECT ULTIMATE</div>
            <div class="high-score-display">RECORDE: <span id="highScoreMain">0</span></div>
            <button class="btn" id="btnToCharSelect" style="border-color: #00ff66;">Iniciar Treino</button>
            <p style="color: #666; text-align: center; max-width: 600px; font-size: 18px; margin-top:20px; text-transform: uppercase; letter-spacing: 1px;">Saltar: Espaço/W | Deslizar: Baixo/S | Rematar: X/Shift | Pausa: P/ESC</p>
        </div>
        <div class="menu-container" id="charSelectMenu" style="display: none;">
            <h1 class="title" style="font-size: 50px; margin-bottom: 5px; color:#fff;">SELECIONA O TEU EGO</h1>
            <div id="charQuote">"Eu vou devorar-te!"</div>
            <div class="char-grid" id="charGrid"></div>
            <button class="btn" id="btnBackToMain" style="font-size: 20px; padding: 10px 30px; border-color: #555; background: rgba(0,0,0,0.5);">Voltar</button>
        </div>
        <div class="menu-container" id="gameOverMenu" style="display: none;">
            <h1 class="title" style="color: #ff0033; text-shadow: 0 0 10px #ff0033; font-size: 70px;">ELIMINADO</h1>
            <div id="newRecordAlert" style="color: #00ff66; font-size: 24px; font-weight: bold; display: none; animation: flashWhite 0.5s infinite alternate;">NOVO RECORDE!</div>
            <div class="subtitle" id="finalScore" style="color: #fff; font-size: 32px; margin-bottom: 5px; font-weight: bold;">GOLOS: 0</div>
            <div id="finalRank" style="font-size: 45px; font-weight: bold; color: gold; margin-bottom: 30px; font-style: italic;">RANK D</div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="btn" id="btnRestart" style="border-color: #00ff66;">Tentar Novamente</button>
                <button class="btn" id="btnChangeChar" style="border-color: #888; color: #aaa; background: rgba(0,0,0,0.5);">Menu</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d', { alpha: false });
        const screens = document.getElementById('screens'), mainMenu = document.getElementById('mainMenu'), charSelectMenu = document.getElementById('charSelectMenu'), gameOverMenu = document.getElementById('gameOverMenu'), uiLayer = document.getElementById('ui-layer'), pauseMenu = document.getElementById('pauseMenu');
        const scoreVal = document.getElementById('scoreVal'), ammoUI = document.getElementById('ammoUI'), ammoCount = document.getElementById('ammoCount'), comboText = document.getElementById('comboText'), rankUI = document.getElementById('rankUI'), charHudName = document.getElementById('charHudName');
        const egoBar = document.getElementById('egoBar'), egoPercent = document.getElementById('egoPercent'), flowText = document.getElementById('flowText'), charQuote = document.getElementById('charQuote');
        
        let highScore = localStorage.getItem('bluelock_highscore') || 0;
        document.getElementById('highScoreMain').innerText = highScore;

        document.getElementById('btnToCharSelect').addEventListener('click', () => showMenu('charSelect')); 
        document.getElementById('btnBackToMain').addEventListener('click', () => showMenu('main')); 
        document.getElementById('btnChangeChar').addEventListener('click', () => showMenu('charSelect')); 
        document.getElementById('btnRestart').addEventListener('click', () => startGame(selectedCharacter));
        document.getElementById('btnPauseTop').addEventListener('click', togglePause); 
        document.getElementById('btnResume').addEventListener('click', togglePause); 
        document.getElementById('btnQuitToMenu').addEventListener('click', () => { isPaused=false; isPlaying=false; showMenu('main'); });

        const CHARACTERS = [ 
            { id: 'isagi', name: 'ISAGI', color: '#00ff66', quote: '"Eu vou reescrever o campo!"' }, 
            { id: 'bachira', name: 'BACHIRA', color: '#ffdd00', quote: '"O monstro está a chamar..."' }, 
            { id: 'rin', name: 'RIN', color: '#00e5ff', quote: '"Vocês são todos mornos."' }, 
            { id: 'sae', name: 'SAE', color: '#ff00aa', quote: '"Futebol é apenas uma equação matemática."' }, 
            { id: 'kunigami', name: 'KUNIGAMI', color: '#ff5500', quote: '"Vou forçar o meu caminho a herói."' }, 
            { id: 'reo', name: 'REO', color: '#aa00ff', quote: '"Vou copiar tudo até ser perfeito."' }, 
            { id: 'barou', name: 'BAROU', color: '#ff0000', quote: '"Não te metas no caminho do Rei!"' }, 
            { id: 'shidou', name: 'SHIDOU', color: '#ff1493', quote: '"A explosão... a biologia!"' }, 
            { id: 'nagi', name: 'NAGI', color: '#ffffff', quote: '"Que maçada... mas vamos lá."'} 
        ];
        let selectedCharacter = CHARACTERS[0];
        const charGrid = document.getElementById('charGrid');
        CHARACTERS.forEach(char => {
            const card = document.createElement('div'); card.className = 'char-card';
            card.style.setProperty('--hover-color', char.color);
            card.onmouseenter = () => { charQuote.innerText = char.quote; charQuote.style.color = char.color; screens.style.background = `radial-gradient(circle at center, rgba(${hexToRgb(char.color)}, 0.1) 0%, rgba(0,0,5,1) 100%)`; };
            card.onclick = () => { selectedCharacter = char; startGame(char); };
            card.innerHTML = `<div class="char-name" style="color:${char.color}">${char.name}</div>`;
            charGrid.appendChild(card);
        });

        function showMenu(menuName) {
            mainMenu.style.display = 'none'; charSelectMenu.style.display = 'none'; gameOverMenu.style.display = 'none'; pauseMenu.style.display = 'none';
            screens.style.display = 'flex'; uiLayer.style.display = 'none'; dangerBorder.style.opacity = '0'; screens.style.background = `radial-gradient(circle at center, rgba(3,3,15,0.95) 0%, rgba(0,0,5,1) 100%)`;
            if(menuName === 'main') mainMenu.style.display = 'flex'; if(menuName === 'charSelect') charSelectMenu.style.display = 'flex'; if(menuName === 'gameOver') { screens.style.display='none'; gameOverMenu.style.display = 'flex'; }
        }

        let BASE_ZOOM = 0.8, CURRENT_ZOOM = 0.8, GW, GH; 
        let GAME_SPEED = 14, META_VISION_SPEED_MULT = 1.0; 
        let BASE_GRAVITY = 1.3, GROUND_HEIGHT = 120;
        
        let isPlaying = false, isPaused = false, isDead = false, animationId, score = 0, smoothScore = 0, ego = 0, distance = 0;
        const MAX_EGO = 100, MAX_AMMO = 6;
        let isFlowMode = false, flowTimer = 0, frameCount = 0;
        let airCombo = 0, ammo = 0, framesSinceLastBall = 999, metaVisionTimer = 0;
        let shakeTime = 0, shakeMagnitude = 0, cameraTilt = 0;
        let currentRankObj = {r: 'D'};
        let rainParticles = [], stadiumLights = [];
        
        function getEffectiveSpeed() { return GAME_SPEED * META_VISION_SPEED_MULT; }
        function triggerShake(magnitude, frames) { shakeMagnitude = magnitude; shakeTime = frames; }

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            GW = Math.ceil(canvas.width / BASE_ZOOM); GH = Math.ceil(canvas.height / BASE_ZOOM);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        const RANKS = [ {s:0, r:'D', c:'#888'}, {s:500, r:'C', c:'#aaa'}, {s:1200, r:'B', c:'#00ff66'}, {s:2500, r:'A', c:'#00e5ff'}, {s:5000, r:'S', c:'#ff00aa'}, {s:9000, r:'SS', c:'#ffdd00'}, {s:15000, r:'SSS', c:'#ff0000'}, {s:30000, r:'EGOIST', c:'#fff'} ];
        function getCurrentRank() { let r = RANKS[0]; for(let i=0; i<RANKS.length; i++) { if(score >= RANKS[i].s) r = RANKS[i]; } return r; }

        function hexToRgb(hex) { let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255'; }

        // [FULL GAME IMPLEMENTATION - Classes, game loop, collision detection, etc.]
        // For brevity, core classes and game loop are included in the full version
        
        function startGame(char) {
            isPlaying = true; isDead = false; isPaused = false;
            score = 0; ego = 0; ammo = 0; airCombo = 0;
            GAME_SPEED = 14; frameCount = 0; isFlowMode = false;
            charHudName.innerText = char.name; charHudName.style.color = char.color;
            screens.style.display = 'none'; uiLayer.style.display = 'flex';
            gameLoop();
        }

        function gameLoop() {
            if(!isPlaying || isPaused) return;
            frameCount++;
            smoothScore += (score - smoothScore) * 0.1;
            scoreVal.innerText = Math.round(smoothScore);
            ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);
            animationId = requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isPlaying = false;
            if(score > highScore) { highScore = score; localStorage.setItem('bluelock_highscore', highScore); document.getElementById('highScoreMain').innerText = highScore; document.getElementById('newRecordAlert').style.display='block'; }
            setTimeout(() => { uiLayer.style.display = 'none'; finalScore.innerText = `GOLOS: ${score}`; let r = getCurrentRank(); finalRank.innerText = `RANK ${r.r}`; finalRank.style.color = r.c; showMenu('gameOver'); }, 600);
        }

        function togglePause() { if(!isPlaying || isDead) return; isPaused = !isPaused; if(isPaused) { pauseMenu.style.display = 'flex'; } else { pauseMenu.style.display = 'none'; gameLoop(); } }

        document.getElementById('btnJump').addEventListener('touchstart', () => {}); 
        document.getElementById('btnSlide').addEventListener('touchstart', () => {}); 
        document.getElementById('btnShoot').addEventListener('touchstart', () => {});
        
        window.addEventListener('keydown', (e) => { if (!isPlaying || isDead) return; if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {}; if (e.code === 'ArrowDown' || e.code === 'KeyS') {}; if (e.code === 'KeyX' || e.code === 'ShiftLeft' || e.code === 'ShiftRight') {}; });

        showMenu('main');
    </script>
</body>
</html>
