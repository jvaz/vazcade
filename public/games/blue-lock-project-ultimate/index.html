<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blue Lock: Project Ultimate</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&display=swap');

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #010103; font-family: 'Teko', sans-serif; touch-action: none; user-select: none; }
        #gameCanvas { display: block; width: 100%; height: 100%; transition: background-color 0.5s; }

        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: none; flex-direction: column; justify-content: space-between; z-index: 20; }
        .hud-top { display: flex; justify-content: space-between; padding: 20px 40px; color: white; text-transform: uppercase; }
        
        .stats-panel { background: rgba(5, 5, 15, 0.85); border: 1px solid rgba(255,255,255,0.1); border-left: 4px solid #00e5ff; padding: 10px 25px; border-radius: 8px; display: flex; flex-direction: column; gap: 2px; }
        .char-hud-name { font-size: 16px; color: #888; letter-spacing: 2px; margin-bottom: -5px; }
        .score-container { font-size: 40px; font-weight: 700; text-shadow: 0 0 10px rgba(0, 229, 255, 0.5); letter-spacing: 2px; display: flex; align-items: center; gap: 20px; line-height: 1; }
        .ammo-container { font-size: 26px; color: #ddd; display: flex; align-items: center; gap: 8px; background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; transition: color 0.2s; }
        .combo-container { font-size: 24px; color: #00ff66; text-shadow: 0 0 10px #00ff66; font-style: italic; opacity: 0; transition: all 0.3s; transform: translateY(-10px); }
        .show-combo { opacity: 1; transform: translateY(0); }
        .combo-shake { animation: shake 0.2s infinite; }
        .rank-container { font-size: 40px; font-weight: 700; color: #fff; text-shadow: 0 0 10px #ffaa00; font-style: italic; letter-spacing: 3px; transition: transform 0.3s; }
        
        .ego-panel { background: rgba(5, 5, 15, 0.85); border: 1px solid rgba(255,255,255,0.1); border-right: 4px solid #ff0033; padding: 15px 25px; border-radius: 8px; width: 180px; text-align: right; }
        .ego-text { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; letter-spacing: 2px; }
        .ego-bar-bg { width: 100%; height: 12px; background-color: #050505; border: 1px solid #333; border-radius: 6px; overflow: hidden; position: relative; }
        .ego-bar-fill { width: 0%; height: 100%; background: linear-gradient(90deg, #333, #fff); transition: width 0.2s ease, background 0.3s; }
        .ego-full { animation: flashWhite 0.5s infinite alternate; }

        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 50% { transform: translate(-1px, -2px) rotate(-1deg); } 100% { transform: translate(-2px, 1px) rotate(1deg); } }
        @keyframes flashWhite { from { box-shadow: 0 0 5px #fff; } to { box-shadow: 0 0 15px #fff, inset 0 0 10px #fff; } }

        #screens { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle at center, rgba(3,3,15,0.95) 0%, rgba(0,0,5,1) 100%); z-index: 50; transition: background 0.5s; }
        .menu-container { display: flex; flex-direction: column; align-items: center; width: 100%; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        .title { font-size: 90px; color: #fff; text-shadow: 0 0 20px #00e5ff; margin: 0; text-align: center; line-height: 1; letter-spacing: 8px; }
        .subtitle { font-size: 24px; color: #aaa; margin-bottom: 20px; letter-spacing: 6px; text-align: center; font-weight: 600; }
        .high-score-display { font-size: 20px; color: #ffdd00; margin-bottom: 20px; letter-spacing: 2px; }

        .btn { pointer-events: auto; background: linear-gradient(135deg, rgba(0,229,255,0.1) 0%, rgba(0,0,0,0.8) 100%); color: white; border: 2px solid #00e5ff; padding: 15px 50px; font-size: 28px; font-family: 'Teko', sans-serif; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; letter-spacing: 3px; border-radius: 4px; margin: 10px; }
        .btn:hover { background: rgba(0,229,255,0.2); border-color: #fff; transform: translateY(-3px); }

        .char-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 15px; margin-bottom: 10px; max-width: 600px; width: 90%; }
        .char-card { background: linear-gradient(to bottom, rgba(20,20,30,0.9), rgba(5,5,10,0.9)); border: 1px solid #333; border-radius: 8px; padding: 15px 5px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .char-name { font-size: 24px; font-weight: 700; color: #888; letter-spacing: 2px; }
        .char-card:hover { transform: scale(1.05) translateY(-5px); border-color: var(--hover-color, #fff); }
        .char-card:hover .char-name { color: #fff; text-shadow: 0 0 10px var(--hover-color); }
        
        #charQuote { height: 30px; color: #fff; font-size: 22px; font-style: italic; margin-bottom: 20px; transition: color 0.3s; }

        .flow-active-text { position: absolute; top: 30%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #fff; opacity: 0; pointer-events: none; transition: opacity 0.4s; letter-spacing: 10px; font-style: italic; z-index: 15; }
        .show-flow { opacity: 1; animation: pulseFlow 0.8s infinite alternate; }
        @keyframes pulseFlow { 0% { transform: translate(-50%, -50%) scale(0.95); } 100% { transform: translate(-50%, -50%) scale(1.05); } }

        .scanlines { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.2) 50%); background-size: 100% 4px; pointer-events: none; z-index: 30; opacity: 0.3; }

        .mobile-controls { display: none; position: absolute; bottom: 30px; width: 100%; justify-content: space-between; padding: 0 30px; box-sizing: border-box; pointer-events: none; z-index: 40; }
        .mobile-group { display: flex; gap: 15px; }
        .mobile-btn { pointer-events: auto; width: 70px; height: 70px; border-radius: 50%; background: rgba(5, 5, 15, 0.85); border: 2px solid rgba(255, 255, 255, 0.2); color: white; font-family: 'Teko', sans-serif; font-size: 20px; font-weight: 600; display: flex; align-items: center; justify-content: center; transition: all 0.1s; }
        .mobile-btn:active { transform: scale(0.9); background: rgba(255,255,255,0.2); }
        .mobile-btn.shoot { border-color: #00e5ff; background: rgba(0, 229, 255, 0.1); }
        .btn-pause { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); width: 40px; height: 40px; border-radius: 5px; background: rgba(0,0,0,0.5); border: 1px solid #555; color: white; font-family: 'Teko'; font-size: 20px; cursor: pointer; pointer-events: auto; z-index: 45; }

        .flash-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; pointer-events: none; opacity: 0; z-index: 60; transition: opacity 0.3s ease-out; }
        .meta-sweep { position: absolute; top: -100%; left: 0; width: 100%; height: 200%; background: linear-gradient(to bottom, transparent, rgba(170,0,255,0.5), transparent); pointer-events: none; z-index: 55; opacity: 0; }
        .speed-lines { position: absolute; top: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5; opacity: 0; transition: opacity 0.3s, background 0.3s; background: radial-gradient(ellipse at center, transparent 70%, rgba(255,255,255,0.05) 100%); }
        .danger-border { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 5px solid red; box-sizing: border-box; pointer-events: none; opacity: 0; z-index: 50; transition: opacity 0.2s; }

        #pauseMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; display: none; flex-direction: column; align-items: center; justify-content: center; }

        @media (max-width: 800px) {
            .char-grid { grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; max-width: 100%; } 
            .char-name { font-size: 18px; letter-spacing: 0px; }
            .mobile-controls { display: flex; } .title { font-size: 50px; } 
            .hud-top { padding: 15px; flex-direction: column; gap: 10px; } 
            .ego-panel { width: 150px; padding: 10px 15px; align-self: flex-end;}
            .stats-panel { padding: 10px 15px; }
            .score-container { font-size: 30px; }
            .rank-container { font-size: 30px; }
        }
    </style>
</head>
<body>

    <div id="flashOverlay" class="flash-overlay"></div>
    <div id="metaSweep" class="meta-sweep"></div>
    <div id="speedLines" class="speed-lines"></div>
    <div id="dangerBorder" class="danger-border"></div>
    <canvas id="gameCanvas"></canvas>
    <div class="scanlines"></div>

    <div id="ui-layer">
        <div class="hud-top">
            <div class="stats-panel">
                <div class="char-hud-name" id="charHudName">ISAGI</div>
                <div class="score-container">
                    GOLOS: <span id="scoreVal" style="color:#fff;">0</span>
                    <span class="ammo-container" id="ammoUI"><span id="ammoIcon" style="color:#00e5ff; font-size:20px;">⚽</span> <span id="ammoCount">0</span>/6</span>
                    <span class="rank-container" id="rankUI">RANK D</span>
                </div>
                <div class="combo-container" id="comboText">COMBO AÉREO x2</div>
            </div>
            <button class="btn-pause" id="btnPauseTop">||</button>
            <div class="ego-panel">
                <div class="ego-text">EGO <span id="egoPercent">0%</span></div>
                <div class="ego-bar-bg"><div class="ego-bar-fill" id="egoBar"></div></div>
            </div>
        </div>
        <div class="mobile-controls">
            <div class="mobile-btn" id="btnSlide">DESLIZ</div>
            <div class="mobile-group">
                <div class="mobile-btn shoot" id="btnShoot">CHUTE</div>
                <div class="mobile-btn" id="btnJump">SALTO</div>
            </div>
        </div>
    </div>

    <div class="flow-active-text" id="flowText">ZONA</div>

    <div id="pauseMenu">
        <h1 class="title" style="font-size: 60px;">PAUSA</h1>
        <button class="btn" id="btnResume">Continuar</button>
        <button class="btn" id="btnQuitToMenu" style="border-color: #ff0033;">Abandonar</button>
    </div>

    <div id="screens">
        <div class="menu-container" id="mainMenu">
            <h1 class="title">BLUE LOCK</h1>
            <div class="subtitle">PROJECT ULTIMATE</div>
            <div class="high-score-display">RECORDE: <span id="highScoreMain">0</span></div>
            <button class="btn" id="btnToCharSelect" style="border-color: #00ff66;">Iniciar Treino</button>
            <p style="color: #666; text-align: center; max-width: 600px; font-size: 18px; margin-top:20px; text-transform: uppercase; letter-spacing: 1px;">Saltar: Espaço/W | Deslizar: Baixo/S | Rematar: X/Shift | Pausa: P/ESC</p>
        </div>
        <div class="menu-container" id="charSelectMenu" style="display: none;">
            <h1 class="title" style="font-size: 50px; margin-bottom: 5px; color:#fff;">SELECIONA O TEU EGO</h1>
            <div id="charQuote">"Eu vou devorar-te!"</div>
            <div class="char-grid" id="charGrid"></div>
            <button class="btn" id="btnBackToMain" style="font-size: 20px; padding: 10px 30px; border-color: #555; background: rgba(0,0,0,0.5);">Voltar</button>
        </div>
        <div class="menu-container" id="gameOverMenu" style="display: none;">
            <h1 class="title" style="color: #ff0033; text-shadow: 0 0 10px #ff0033; font-size: 70px;">ELIMINADO</h1>
            <div id="newRecordAlert" style="color: #00ff66; font-size: 24px; font-weight: bold; display: none; animation: flashWhite 0.5s infinite alternate;">NOVO RECORDE!</div>
            <div class="subtitle" id="finalScore" style="color: #fff; font-size: 32px; margin-bottom: 5px; font-weight: bold;">GOLOS: 0</div>
            <div id="finalRank" style="font-size: 45px; font-weight: bold; color: gold; margin-bottom: 30px; font-style: italic;">RANK D</div>
            <div style="display: flex; gap: 15px; flex-wrap: wrap; justify-content: center;">
                <button class="btn" id="btnRestart" style="border-color: #00ff66;">Tentar Novamente</button>
                <button class="btn" id="btnChangeChar" style="border-color: #888; color: #aaa; background: rgba(0,0,0,0.5);">Menu</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas'); const ctx = canvas.getContext('2d', { alpha: false });
        const flashOverlay = document.getElementById('flashOverlay'), speedLines = document.getElementById('speedLines'), metaSweep = document.getElementById('metaSweep'), dangerBorder = document.getElementById('dangerBorder');
        const screens = document.getElementById('screens'), mainMenu = document.getElementById('mainMenu'), charSelectMenu = document.getElementById('charSelectMenu'), gameOverMenu = document.getElementById('gameOverMenu'), uiLayer = document.getElementById('ui-layer'), pauseMenu = document.getElementById('pauseMenu');
        const scoreVal = document.getElementById('scoreVal'), ammoUI = document.getElementById('ammoUI'), ammoCount = document.getElementById('ammoCount'), ammoIcon = document.getElementById('ammoIcon'), comboText = document.getElementById('comboText'), rankUI = document.getElementById('rankUI'), charHudName = document.getElementById('charHudName');
        const egoBar = document.getElementById('egoBar'), egoPercent = document.getElementById('egoPercent'), flowText = document.getElementById('flowText'), charQuote = document.getElementById('charQuote');
        
        let highScore = localStorage.getItem('bluelock_highscore') || 0;
        document.getElementById('highScoreMain').innerText = highScore;

        document.getElementById('btnToCharSelect').addEventListener('click', () => showMenu('charSelect')); document.getElementById('btnBackToMain').addEventListener('click', () => showMenu('main')); document.getElementById('btnChangeChar').addEventListener('click', () => showMenu('charSelect')); document.getElementById('btnRestart').addEventListener('click', () => startGame(selectedCharacter));
        document.getElementById('btnPauseTop').addEventListener('click', togglePause); document.getElementById('btnResume').addEventListener('click', togglePause); document.getElementById('btnQuitToMenu').addEventListener('click', () => { isPaused=false; isPlaying=false; showMenu('main'); });

        const CHARACTERS = [ 
            { id: 'isagi', name: 'ISAGI', color: '#00ff66', quote: '"Eu vou reescrever o campo!"' }, 
            { id: 'bachira', name: 'BACHIRA', color: '#ffdd00', quote: '"O monstro está a chamar..."' }, 
            { id: 'rin', name: 'RIN', color: '#00e5ff', quote: '"Vocês são todos mornos."' }, 
            { id: 'sae', name: 'SAE', color: '#ff00aa', quote: '"Futebol é apenas uma equação matemática."' }, 
            { id: 'kunigami', name: 'KUNIGAMI', color: '#ff5500', quote: '"Vou forçar o meu caminho a herói."' }, 
            { id: 'reo', name: 'REO', color: '#aa00ff', quote: '"Vou copiar tudo até ser perfeito."' }, 
            { id: 'barou', name: 'BAROU', color: '#ff0000', quote: '"Não te metas no caminho do Rei!"' }, 
            { id: 'shidou', name: 'SHIDOU', color: '#ff1493', quote: '"A explosão... a biologia!"' }, 
            { id: 'nagi', name: 'NAGI', color: '#ffffff', quote: '"Que maçada... mas vamos lá."'} 
        ];
        let selectedCharacter = CHARACTERS[0];
        const charGrid = document.getElementById('charGrid');
        CHARACTERS.forEach(char => {
            const card = document.createElement('div'); card.className = 'char-card';
            card.style.setProperty('--hover-color', char.color);
            card.onmouseenter = () => { charQuote.innerText = char.quote; charQuote.style.color = char.color; screens.style.background = `radial-gradient(circle at center, rgba(${hexToRgb(char.color)}, 0.1) 0%, rgba(0,0,5,1) 100%)`; };
            card.onclick = () => { selectedCharacter = char; startGame(char); };
            card.innerHTML = `<div class="char-name" style="color:${char.color}">${char.name}</div>`;
            charGrid.appendChild(card);
        });

        function showMenu(menuName) {
            mainMenu.style.display = 'none'; charSelectMenu.style.display = 'none'; gameOverMenu.style.display = 'none'; pauseMenu.style.display = 'none';
            screens.style.display = 'flex'; uiLayer.style.display = 'none'; dangerBorder.style.opacity = '0'; screens.style.background = `radial-gradient(circle at center, rgba(3,3,15,0.95) 0%, rgba(0,0,5,1) 100%)`;
            if(menuName === 'main') mainMenu.style.display = 'flex'; if(menuName === 'charSelect') charSelectMenu.style.display = 'flex'; if(menuName === 'gameOver') { screens.style.display='none'; gameOverMenu.style.display = 'flex'; }
        }

        let BASE_ZOOM = 0.8, CURRENT_ZOOM = 0.8, GW, GH; 
        let GAME_SPEED = 14, META_VISION_SPEED_MULT = 1.0; 
        let BASE_GRAVITY = 1.3, GROUND_HEIGHT = 120;
        
        let isPlaying = false, isPaused = false, isDead = false, animationId, score = 0, smoothScore = 0, ego = 0, distance = 0;
        const MAX_EGO = 100, MAX_AMMO = 6;
        let isFlowMode = false, flowTimer = 0, frameCount = 0;
        let airCombo = 0, ammo = 0, framesSinceLastBall = 999, metaVisionTimer = 0;
        let shakeTime = 0, shakeMagnitude = 0, cameraTilt = 0;
        let currentRankObj = {r: 'D'};
        let rainParticles = [], stadiumLights = [];
        
        function getEffectiveSpeed() { return GAME_SPEED * META_VISION_SPEED_MULT; }
        function triggerShake(magnitude, frames) { shakeMagnitude = magnitude; shakeTime = frames; }

        function resizeCanvas() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            GW = Math.ceil(canvas.width / BASE_ZOOM); GH = Math.ceil(canvas.height / BASE_ZOOM);
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        const RANKS = [ {s:0, r:'D', c:'#888'}, {s:500, r:'C', c:'#aaa'}, {s:1200, r:'B', c:'#00ff66'}, {s:2500, r:'A', c:'#00e5ff'}, {s:5000, r:'S', c:'#ff00aa'}, {s:9000, r:'SS', c:'#ffdd00'}, {s:15000, r:'SSS', c:'#ff0000'}, {s:30000, r:'EGOIST', c:'#fff'} ];
        function getCurrentRank() { let r = RANKS[0]; for(let i=0; i<RANKS.length; i++) { if(score >= RANKS[i].s) r = RANKS[i]; } return r; }

        function hexToRgb(hex) { let result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex); return result ? `${parseInt(result[1], 16)}, ${parseInt(result[2], 16)}, ${parseInt(result[3], 16)}` : '255,255,255'; }

        function drawFootball(x, y, radius, spin, color = '#fff') {
            ctx.save(); ctx.translate(x|0, y|0); ctx.rotate(spin);
            ctx.fillStyle = color === '#fff' ? '#dddddd' : color;
            ctx.beginPath(); ctx.arc(0, 0, radius, 0, Math.PI * 2); ctx.fill(); 
            ctx.lineWidth = 1; ctx.strokeStyle = '#222'; ctx.stroke();
            ctx.fillStyle = '#111'; ctx.beginPath();
            for (let i = 0; i < 5; i++) { let a = (i * Math.PI * 2) / 5; let hx = Math.cos(a) * radius * 0.35; let hy = Math.sin(a) * radius * 0.35; if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy); }
            ctx.closePath(); ctx.fill();
            ctx.strokeStyle = '#333'; ctx.lineWidth = 2;
            for (let i = 0; i < 5; i++) { let a = (i * Math.PI * 2) / 5; let sX = Math.cos(a)*radius*0.35, sY = Math.sin(a)*radius*0.35, eX = Math.cos(a)*radius*0.9, eY = Math.sin(a)*radius*0.9; ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(eX, eY); ctx.stroke(); }
            ctx.restore();
        }

        class BackgroundHex {
            constructor() { this.radius = Math.random() * 80 + 40; this.x = GW + this.radius; this.y = Math.random() * (GH - GROUND_HEIGHT); this.speedMult = Math.random() * 0.3 + 0.1; this.alpha = Math.random() * 0.2 + 0.05; this.rot = 0; this.rotSpeed = (Math.random()-0.5)*0.05; }
            update() { this.x -= getEffectiveSpeed() * this.speedMult * (isFlowMode ? 2 : 1); this.rot += this.rotSpeed; }
            draw() { 
                ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.rot);
                ctx.strokeStyle = `rgba(${hexToRgb(isFlowMode ? selectedCharacter.color : '#00e5ff')}, ${this.alpha})`; ctx.lineWidth = 1; ctx.beginPath();
                for (let i = 0; i < 6; i++) { let angle = (Math.PI / 3) * i; let hx = this.radius * Math.cos(angle); let hy = this.radius * Math.sin(angle); if (i === 0) ctx.moveTo(hx, hy); else ctx.lineTo(hx, hy); }
                ctx.closePath(); ctx.stroke(); ctx.restore();
            }
        }

        class FloatingText {
            constructor(text, x, y, color, size = 36, isPopup=false) { this.text = text; this.x = x; this.y = y; this.color = color; this.life = 1.0; this.vy = -3; this.size = size; this.isPopup = isPopup; }
            update() { this.y += this.vy; this.vy *= 0.9; this.life -= (this.isPopup ? 0.015 : 0.03); }
            draw() { ctx.save(); ctx.globalAlpha = Math.max(0, this.life); let s = this.isPopup ? this.size * (1+Math.sin(this.life*Math.PI)) : this.size; ctx.fillStyle = '#fff'; ctx.font = `bold italic ${s}px Teko`; ctx.strokeStyle = '#000'; ctx.lineWidth = 4; ctx.strokeText(this.text, this.x - (this.isPopup?100:30), this.y); ctx.fillStyle = this.color; ctx.fillText(this.text, this.x - (this.isPopup?100:30), this.y); ctx.restore(); }
        }

        class Player {
            constructor(charData) {
                this.x = GW * 0.15; this.normalWidth = 45; this.normalHeight = 95; this.slideHeight = 50;
                this.width = this.normalWidth; this.height = this.normalHeight; this.y = GH - GROUND_HEIGHT - this.height;
                this.vy = 0; this.jumpCount = 0; this.maxJumps = 2; this.isSliding = false; this.isFastFalling = false;
                this.baseColor = charData.color; this.hasShield = false; this.history = []; this.animPulse = 0;
            }
            update() {
                if(isDead) return;
                let grav = BASE_GRAVITY;
                if(selectedCharacter.id === 'nagi') grav *= 0.85;
                if(airCombo >= 4 && !this.isFastFalling) grav *= 0.8;
                
                this.vy += grav * (metaVisionTimer > 0 ? 0.7 : 1); this.y += this.vy; this.animPulse += 0.2;
                
                cameraTilt += ((-this.y + (GH/2)) * 0.1 - cameraTilt) * 0.1; // Dinâmica da câmara
                
                let onGround = false; const groundY = GH - GROUND_HEIGHT - this.height;
                if (this.y >= groundY) { this.y = groundY; this.vy = 0; this.jumpCount = 0; onGround = true; this.isFastFalling = false; if (airCombo > 0) airCombo = 0; } 
                else {
                    for (let p of platforms) {
                        if (this.x + this.width > p.x && this.x < p.x + p.width) {
                            let prevBottom = (this.y - this.vy) + this.height;
                            if (this.vy >= 0 && prevBottom <= p.y + 25 && this.y + this.height >= p.y) { this.y = p.y - this.height; this.vy = 0; this.jumpCount = 0; onGround = true; this.isFastFalling = false; break; }
                        }
                    }
                }
                if (!onGround && this.vy > 0 && this.jumpCount === 0) { this.jumpCount = 1; if (this.isSliding && !this.isFastFalling) this.slide(false); }

                let trailColor = selectedCharacter.id === 'reo' && projectiles.length > 0 ? projectiles[projectiles.length-1].color : this.baseColor;

                const rand = Math.random();
                if (rand < 0.15) { platforms.push(new Platform(Math.random() > 0.5 ? 1 : 2)); nextObstacleFrames = 60; } 
                else if (rand < 0.85) { const types = ['low', 'high', 'drone', 'gk', 'red_gk', 'wall', 'laser', 'pad', 'holo', 'defender']; obstacles.push(new Obstacle(types[Math.floor(Math.random() * types.length)])); nextObstacleFrames = Math.floor(40 * (14 / GAME_SPEED)) + Math.random() * 25; } 
                else { collectibles.push(new Collectible()); nextObstacleFrames = 45; }
            }
        }

        function checkCollisions() {
            const tol = 8; const px = player.x + tol, py = player.y + tol, pw = player.width - tol*2, ph = player.height - tol*2;

            for (let j = 0; j < projectiles.length; j++) {
                let p = projectiles[j]; if (!p.active) continue;
                if (p.x > GW) { p.active = false; ego = Math.max(0, ego - 5); floatingTexts.push(new FloatingText("FALHA (-EGO)", GW-150, p.y, '#ff0000')); updateUI(); continue; }
                for (let i = 0; i < obstacles.length; i++) {
                    let obs = obstacles[i]; if (obs.type === 'laser' && !obs.isActive) continue; if (obs.type === 'pad' || obs.type === 'holo') continue;
                    if (p.x + p.radius > obs.x && p.x - p.radius < obs.x + obs.width && p.y + p.radius > obs.y && p.y - p.radius < obs.y + obs.height) {
                        if ((obs.type.includes('gk') || obs.type === 'defender') && !p.isPerfect && !p.isDirect) { p.vx = -40; p.color = '#ff0000'; ego = Math.max(0, ego - 10); floatingTexts.push(new FloatingText("DEFENDIDO!", obs.x, obs.y, '#ff0000', 50)); triggerShake(8, 10); updateUI(); break; }
                        createParticles(obs.x + obs.width/2, obs.y + obs.height/2, 20, p.color);
                        if(obs.type === 'drone') { for(let k=0;k<5;k++) particles.push(new Particle(obs.x, obs.y, '#555')); } // Debris
                        floatingTexts.push(new FloatingText("GOLO!", obs.x, obs.y - 20, p.color, 50)); obstacles.splice(i, 1);
                        let mult = (airCombo > 0 ? airCombo + 1 : 1) * (metaVisionTimer > 0 ? 2 : 1);
                        if (p.isDirect) score += 40 * mult; else if (p.isPerfect) score += 20 * mult; else score += 10 * mult;
                        triggerShake(p.isDirect?8:4, 10); if (!p.isPerfect && !p.isDirect) p.active = false; break; 
                    }
                }
            }

            for (let i = 0; i < obstacles.length; i++) {
                const obs = obstacles[i];
                if (!obs.passed && obs.x + obs.width < player.x) { obs.passed = true; if(obs.type==='holo') score += 10; else score += (isFlowMode ? 3 : 1) * (airCombo+1) * (metaVisionTimer>0?2:1); updateUI(); }
                if (obs.type === 'laser' && !obs.isActive) continue;
                if (obs.type === 'holo') continue;

                if (px < obs.x + obs.width && px + pw > obs.x && py < obs.y + obs.height && py + ph > obs.y) {
                    if (obs.type === 'pad') { player.jump(true, -38); triggerShake(5,10); createParticles(obs.x+obs.width/2, obs.y, 10, '#00ff66'); continue; }
                    let isStomp = player.vy > 0 && ((py + ph) - player.vy) <= obs.y + 40; if (obs.type === 'wall' || obs.type === 'laser') isStomp = false; 
                    
                    if ((isFlowMode && selectedCharacter.id === 'kunigami' && obs.type === 'wall') || isFlowMode || getEffectiveSpeed() > 25) {
                        createParticles(obs.x + obs.width/2, obs.y + obs.height/2, 20, obs.color); obstacles.splice(i, 1); i--; score += 5 * (airCombo+1); triggerShake(5, 10); updateUI();
                    } else if (isStomp && !player.isSliding) { 
                        player.vy = -22; player.jumpCount = 1; player.isFastFalling = false; airCombo++; createParticles(obs.x + obs.width/2, obs.y, 20, selectedCharacter.color);
                        score += (player.vy > 20 ? 15 : 8) * (airCombo+1) * (selectedCharacter.id === 'shidou' ? 1.5 : 1); floatingTexts.push(new FloatingText(`ESMAGADO!`, obs.x, obs.y - 30, selectedCharacter.color, 40));
                        obstacles.splice(i, 1); i--; ego += 20; if (ego >= MAX_EGO && !isFlowMode) activateFlow(); updateUI(); triggerShake(5, 10);
                        if(selectedCharacter.id === 'barou') triggerShake(10, 15);
                    } else if (player.hasShield) { player.hasShield = false; createParticles(obs.x, obs.y, 20, '#00ff00'); floatingTexts.push(new FloatingText("ESCUDO QUEBRADO!", player.x, player.y - 50, "#00ff00", 40)); obstacles.splice(i, 1); i--; triggerShake(8, 15); 
                    } else { gameOver(); }
                }
            }

            for (let i = 0; i < collectibles.length; i++) {
                const col = collectibles[i]; if (col.collected) continue;
                if (Math.sqrt(Math.pow(col.x - (px+pw/2), 2) + Math.pow(col.y - (py+ph/2), 2)) <= col.radius + Math.max(pw,ph)/2) {
                    col.collected = true;
                    if (col.type === 'ball') { framesSinceLastBall = 0; if (ammo >= MAX_AMMO) { triggerChemicalReaction(); } else { ammo++; floatingTexts.push(new FloatingText("BOLA!", col.x, col.y, '#00e5ff', 35)); flashOverlay.style.opacity='0.5'; setTimeout(()=>flashOverlay.style.opacity='0', 100); } } 
                    else if (col.type === 'vision') { metaVisionTimer = 300; floatingTexts.push(new FloatingText("META VISÃO!", col.x, col.y, '#aa00ff', 50)); triggerShake(8, 10); metaSweep.style.opacity='1'; metaSweep.style.top='100%'; setTimeout(()=>{metaSweep.style.opacity='0'; metaSweep.style.top='-100%';}, 500); } 
                    else if (col.type === 'puzzle') { ego += (selectedCharacter.id === 'isagi' ? 40 : 20); floatingTexts.push(new FloatingText("PEÇA!", col.x, col.y, '#0055ff', 30)); if (ego >= MAX_EGO && !isFlowMode) activateFlow(); }
                    else { ego += 20; if (ego >= MAX_EGO && !isFlowMode) activateFlow(); }
                    createParticles(col.x, col.y, 15, '#ffffff'); updateUI();
                }
            }
        }

        function checkRankUp() {
            let r = getCurrentRank();
            if(r.r !== currentRankObj.r && score > 0) {
                currentRankObj = r;
                floatingTexts.push(new FloatingText(`RANK UP: ${r.r}!`, GW/2, GH/2, r.c, 70, true));
                triggerShake(10, 20); rankUI.style.transform = 'scale(1.5)'; setTimeout(()=>rankUI.style.transform = 'scale(1)', 300);
            }
            rankUI.innerText = `RANK ${r.r}`; rankUI.style.color = r.c;
        }

        function updateUI() {
            ammoCount.innerText = ammo; 
            if(airCombo >= 9 && !comboText.classList.contains('show-combo')) floatingTexts.push(new FloatingText("EGOIST!", GW/2, 100, '#fff', 80, true));
            if (airCombo > 0) { comboText.innerText = `COMBO x${airCombo + 1}`; comboText.classList.add('show-combo'); comboText.style.fontSize = Math.min(24 + airCombo*2, 40)+'px'; if(airCombo>=4) comboText.classList.add('combo-shake'); else comboText.classList.remove('combo-shake'); } else { comboText.classList.remove('show-combo'); comboText.classList.remove('combo-shake'); }
            
            checkRankUp();

            const displayEgo = Math.min(ego, MAX_EGO); egoPercent.innerText = Math.floor(displayEgo) + '%'; egoBar.style.width = displayEgo + '%';
            if (displayEgo >= 100 && !isFlowMode) egoBar.parentElement.classList.add('ego-full'); else egoBar.parentElement.classList.remove('ego-full');

            if (isFlowMode) { egoBar.style.background = `linear-gradient(90deg, #fff, ${selectedCharacter.color})`; egoPercent.innerText = 'ZONA'; egoPercent.style.color = selectedCharacter.color; } 
            else { egoBar.style.background = `linear-gradient(90deg, #333, ${selectedCharacter.color})`; egoPercent.style.color = '#fff'; }
            
            if(getEffectiveSpeed() > 22 && !isFlowMode) { speedLines.style.opacity = '0.5'; speedLines.style.background = 'radial-gradient(ellipse at center, transparent 70%, rgba(255,255,255,0.05) 100%)'; } 
            else if (isFlowMode) { speedLines.style.opacity = '0.8'; speedLines.style.background = `radial-gradient(ellipse at center, transparent 70%, rgba(${hexToRgb(selectedCharacter.color)},0.15) 100%)`; }
            else { speedLines.style.opacity = '0'; }

            // Danger border
            let danger = false;
            if(!isFlowMode) {
                if(getEffectiveSpeed() > 28) danger = true;
                if(obstacles.some(o => o.x > player.x && o.x - player.x < 200)) danger = true;
            }
            dangerBorder.style.opacity = danger ? '1' : '0';
        }

        function drawBackgroundSystem() {
            let bgDarkness = Math.min(1, GAME_SPEED / 40);
            ctx.fillStyle = isFlowMode ? '#000' : `rgba(${5 - bgDarkness*5}, ${5 - bgDarkness*5}, ${16 - bgDarkness*10}, 1)`; 
            ctx.fillRect(0, 0, GW+500, GH+500); 
            
            if (metaVisionTimer > 0) { ctx.fillStyle = 'rgba(170, 0, 255, 0.1)'; ctx.fillRect(0, 0, GW+500, GH+500); }

            // Stadium Lights & Rain & Monitors
            ctx.save();
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            for(let i=0; i<stadiumLights.length; i++) {
                let sl = stadiumLights[i]; sl.x -= getEffectiveSpeed() * 0.5;
                ctx.beginPath(); ctx.moveTo(sl.x, 0); ctx.lineTo(sl.x+50, 0); ctx.lineTo(sl.x-100, GH); ctx.lineTo(sl.x-150, GH); ctx.fill();
                if(sl.x < -200) sl.x = GW + Math.random()*500;
            }
            ctx.fillStyle = 'rgba(0,100,255,0.2)';
            if(frameCount%5===0) rainParticles.push({x: Math.random()*GW, y: 0, l: Math.random()*20+10});
            for(let i=rainParticles.length-1; i>=0; i--) { let r = rainParticles[i]; r.x -= getEffectiveSpeed(); r.y += 20; ctx.fillRect(r.x, r.y, 1, r.l); if(r.y > GH) rainParticles.splice(i,1); }
            ctx.restore();

            for (let i = bgHexes.length - 1; i >= 0; i--) { bgHexes[i].update(); bgHexes[i].draw(); if (bgHexes[i].x + 200 < 0) bgHexes.splice(i, 1); }
            ctx.fillStyle = isFlowMode ? '#000' : '#050505'; ctx.fillRect(0, GH - GROUND_HEIGHT, GW+500, GROUND_HEIGHT);
            
            ctx.save(); let floorColor = isFlowMode ? selectedCharacter.color : (metaVisionTimer > 0 ? '#aa00ff' : '#00e5ff');
            ctx.strokeStyle = `rgba(${hexToRgb(floorColor)}, ${0.4 + Math.sin(frameCount*0.1)*0.2})`; ctx.lineWidth = isFlowMode ? 2 : 1; // Pulsa
            ctx.beginPath(); ctx.moveTo(0, GH - GROUND_HEIGHT); ctx.lineTo(GW+500, GH - GROUND_HEIGHT); ctx.stroke();
            
            let offset = (distance * 0.8) % 150; 
            for(let x = -offset; x < GW+500; x += 150) { ctx.beginPath(); ctx.moveTo(x|0, GH - GROUND_HEIGHT); let vpX = GW/2; let dir = (x - vpX) * 1.5; ctx.lineTo((vpX + dir)|0, GH); ctx.stroke(); }
            
            let speedOffY = (distance * 0.2) % 40;
            for(let y = 0; y < GROUND_HEIGHT; y += 40) { let actY = GH - GROUND_HEIGHT + y + speedOffY; if(actY <= GH) { ctx.beginPath(); ctx.moveTo(0, actY|0); ctx.lineTo(GW+500, actY|0); ctx.stroke(); } }
            
            // Distance markers
            ctx.fillStyle = `rgba(${hexToRgb(floorColor)}, 0.5)`; ctx.font = '20px Teko';
            if ((distance/10) % 100 < getEffectiveSpeed()) { floatingTexts.push(new FloatingText(`${Math.floor(distance/10)}m`, GW-50, GH-GROUND_HEIGHT+30, floorColor, 20)); }
            ctx.restore();
        }

        function gameLoop() {
            if (!isPlaying || isPaused) return; frameCount++; framesSinceLastBall++; distance += getEffectiveSpeed();
            
            if(!isDead) {
                if (frameCount % 240 === 0 && GAME_SPEED < 38) GAME_SPEED += 0.5;
                if (metaVisionTimer > 0) { metaVisionTimer--; META_VISION_SPEED_MULT = 0.5; ego = Math.max(0, ego - 0.1); updateUI(); } else { META_VISION_SPEED_MULT = 1.0; }
                let targetZoom = BASE_ZOOM; if (isFlowMode || metaVisionTimer > 0) targetZoom = BASE_ZOOM * 1.05; else if (GAME_SPEED > 25) targetZoom = BASE_ZOOM * 0.95; CURRENT_ZOOM += (targetZoom - CURRENT_ZOOM) * 0.05;
                if (isFlowMode) { flowTimer--; ego = (flowTimer / 400) * 100; updateUI(); if (flowTimer <= 0) { isFlowMode = false; GAME_SPEED -= 6; flowText.classList.remove('show-flow'); speedLines.style.opacity = '0'; floatingTexts.push(new FloatingText("LOCK OFF", player.x, player.y-50, '#fff', 50)); updateUI(); } }
            }

            smoothScore += (score - smoothScore) * 0.1;
            scoreVal.innerText = Math.round(smoothScore);

            ctx.fillStyle = '#010103'; ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save(); ctx.translate(canvas.width/2, canvas.height/2 + cameraTilt); ctx.scale(CURRENT_ZOOM, CURRENT_ZOOM); ctx.translate(-canvas.width/2, -canvas.height/2);
            if (shakeTime > 0) { ctx.translate((Math.random() - 0.5) * shakeMagnitude, (Math.random() - 0.5) * shakeMagnitude); shakeTime--; }

            drawBackgroundSystem();

            for (let i = platforms.length - 1; i >= 0; i--) { platforms[i].update(); platforms[i].draw(); if (platforms[i].x + platforms[i].width < 0) platforms.splice(i, 1); }
            
            player.update(); player.draw(); if(!isDead) spawnEntities();

            for (let i = obstacles.length - 1; i >= 0; i--) { obstacles[i].update(); obstacles[i].draw(); if (obstacles[i].x + obstacles[i].width < 0) obstacles.splice(i, 1); }
            for (let i = collectibles.length - 1; i >= 0; i--) { collectibles[i].update(); if (!collectibles[i].collected) collectibles[i].draw(); if (collectibles[i].x < 0 || (collectibles[i].collected && particles.length === 0)) collectibles.splice(i, 1); }
            for (let i = projectiles.length - 1; i >= 0; i--) { projectiles[i].update(); projectiles[i].draw(); if (projectiles[i].x > GW + 200 || !projectiles[i].active) projectiles.splice(i, 1); }

            if(!isDead) checkCollisions();

            for (let i = particles.length - 1; i >= 0; i--) { particles[i].update(); particles[i].draw(); if (particles[i].life <= 0) particles.splice(i, 1); }
            for (let i = floatingTexts.length - 1; i >= 0; i--) { floatingTexts[i].update(); floatingTexts[i].draw(); if (floatingTexts[i].life <= 0) floatingTexts.splice(i, 1); }
            
            ctx.restore(); animationId = requestAnimationFrame(gameLoop);
        }

        function startGame(char) {
            player = new Player(char); obstacles = []; collectibles = []; platforms = []; particles = []; floatingTexts = []; projectiles = []; bgHexes = []; rainParticles = []; stadiumLights = [{x:GW},{x:GW*1.5}];
            score = 0; smoothScore = 0; ego = 0; ammo = 0; airCombo = 0; GAME_SPEED = 14; frameCount = 0; distance = 0; isFlowMode = false; metaVisionTimer = 0; shakeTime = 0; cameraTilt = 0; CURRENT_ZOOM = BASE_ZOOM; isDead = false; isPaused = false; currentRankObj = {r:'D'};
            charHudName.innerText = char.name; charHudName.style.color = char.color;
            flashOverlay.style.opacity = '0'; flowText.classList.remove('show-flow'); speedLines.style.opacity = '0';
            updateUI(); screens.style.display = 'none'; uiLayer.style.display = 'flex'; dangerBorder.style.opacity = '0'; isPlaying = true; document.getElementById('newRecordAlert').style.display='none'; gameLoop();
        }

        function gameOver() {
            isDead = true; triggerShake(20, 30); dangerBorder.style.opacity = '0';
            for(let i=0; i<30; i++) particles.push(new PuzzleParticle(player.x+player.width/2, player.y+player.height/2, selectedCharacter.color));
            speedLines.style.opacity = '0';
            
            if(score > highScore) { highScore = score; localStorage.setItem('bluelock_highscore', highScore); document.getElementById('highScoreMain').innerText = highScore; document.getElementById('newRecordAlert').style.display='block'; }
            
            setTimeout(() => {
                isPlaying = false; cancelAnimationFrame(animationId);
                let flashOut = document.createElement('div'); flashOut.style.position = 'absolute'; flashOut.style.top = '0'; flashOut.style.left = '0'; flashOut.style.width = '100%'; flashOut.style.height = '100%'; flashOut.style.backgroundColor = '#000'; flashOut.style.opacity = '0'; flashOut.style.transition = 'opacity 0.5s ease'; flashOut.style.zIndex = '45'; document.body.appendChild(flashOut);
                setTimeout(() => flashOut.style.opacity = '0.8', 50);
                setTimeout(() => { uiLayer.style.display = 'none'; finalScore.innerText = `GOLOS: ${score}`; let r = getCurrentRank(); finalRank.innerText = `RANK ${r.r}`; finalRank.style.color = r.c; showMenu('gameOver'); document.body.removeChild(flashOut); }, 600);
            }, 1000);
        }

        showMenu('main');
    </script>
