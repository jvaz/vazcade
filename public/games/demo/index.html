<!DOCTYPE html>
<html>
<head>
    <title>Demo Game</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #222; color: #fff; font-family: sans-serif; overflow: hidden; }
        #canvas { background: #333; border: 4px solid #555; cursor: crosshair; }
        .score { position: absolute; top: 20px; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div class="score">Score: <span id="score">0</span></div>
    <canvas id="canvas" width="600" height="400"></canvas>
    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let score = 0;
        let ball = { x: 300, y: 200, r: 20, dx: 4, dy: 4, color: '#f00' };

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = ball.color;
            ctx.fill();
            ctx.closePath();
            
            ball.x += ball.dx;
            ball.y += ball.dy;

            if(ball.x + ball.r > canvas.width || ball.x - ball.r < 0) ball.dx = -ball.dx;
            if(ball.y + ball.r > canvas.height || ball.y - ball.r < 0) ball.dy = -ball.dy;

            requestAnimationFrame(draw);
        }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const dist = Math.sqrt((mouseX - ball.x)**2 + (mouseY - ball.y)**2);
            
            if(dist < ball.r) {
                score++;
                document.getElementById('score').innerText = score;
                ball.dx *= 1.1;
                ball.dy *= 1.1;
                ball.color = `hsl(${Math.random() * 360}, 70%, 50%)`;
            }
        });

        draw();
    </script>
</body>
</html>
