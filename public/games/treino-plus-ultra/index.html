<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Treino Plus Ultra - Ultimate</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;700;900&display=swap');
       
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020617;
            font-family: 'Nunito', sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
        }
       
        .mha-title {
            font-family: 'Bangers', cursive;
            letter-spacing: 2px;
            text-shadow: 3px 3px 0px #7f1d1d, 5px 5px 0px #000;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        .hud-text {
            font-family: 'Bangers', cursive;
            letter-spacing: 1px;
            text-shadow: 2px 2px 0px #000, 0 0 10px rgba(0,0,0,0.8);
        }

        .custom-card {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #334155;
            background: linear-gradient(145deg, #1e293b, #0f172a);
            box-shadow: 5px 5px 15px #050b14, -5px -5px 15px #192336;
        }
        .custom-card.selected {
            border-color: #fde047;
            transform: scale(1.05) translateY(-5px);
            box-shadow: 0 10px 25px rgba(253, 224, 71, 0.4), inset 0 0 15px rgba(253, 224, 71, 0.2);
        }
        .custom-card.locked {
            opacity: 0.6;
            filter: grayscale(100%);
            cursor: not-allowed;
            border-color: #1e293b;
        }
        .custom-card.locked:hover {
            transform: none;
            box-shadow: 5px 5px 15px #050b14;
        }

        .diff-btn {
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        .diff-btn.selected-easy { background-color: #059669; border-color: #34d399; box-shadow: 0 0 15px rgba(16,185,129,0.5); }
        .diff-btn.selected-normal { background-color: #d97706; border-color: #fbbf24; box-shadow: 0 0 15px rgba(245,158,11,0.5); }
        .diff-btn.selected-hard { background-color: #dc2626; border-color: #f87171; box-shadow: 0 0 15px rgba(239,68,68,0.5); }

        @keyframes pulse-glow {
            0% { box-shadow: 0 0 10px #fde047, 0 0 20px #fde047; transform: scale(1); }
            50% { box-shadow: 0 0 25px #fde047, 0 0 40px #fde047; transform: scale(1.05); }
            100% { box-shadow: 0 0 10px #fde047, 0 0 20px #fde047; transform: scale(1); }
        }
        .ult-ready {
            animation: pulse-glow 1.5s infinite;
            border-color: #fde047 !important;
            color: #fde047 !important;
            text-shadow: 0 0 10px rgba(253,224,71,0.8);
        }

        .progress-bar-container { background: #0f172a; border-radius: 8px; border: 2px solid #334155; overflow: hidden; box-shadow: inset 0 2px 4px rgba(0,0,0,0.8); }
       
        @keyframes comboPop { 0% { transform: scale(1); } 50% { transform: scale(1.5); color: #fff; } 100% { transform: scale(1); } }
        .combo-animate { animation: comboPop 0.3s ease-out; }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
       
        #comboBar { transition: width 0.1s linear; }
    </style>
</head>
<body class="text-white relative w-screen h-screen">

    <!-- HUD -->
    <div id="hud" class="absolute top-0 left-0 w-full p-4 pointer-events-none hidden z-10 flex justify-between items-start">
        <div class="flex flex-col gap-2 pointer-events-auto w-1/3">
            <div class="text-3xl md:text-4xl hud-text text-white drop-shadow-md">
                PONTOS: <span id="scoreDisplay" class="text-yellow-400">0</span>
            </div>
           
            <div class="flex flex-col w-48 md:w-64">
                <div class="flex justify-between text-sm font-bold mb-1">
                    <span class="text-yellow-400 drop-shadow-md">PLUS ULTRA</span>
                    <span id="coinsDisplay" class="text-white">0%</span>
                </div>
                <div class="progress-bar-container h-3 md:h-4">
                    <div id="coinsBar" class="h-full bg-gradient-to-r from-ca8a04 to-fde047 w-0 transition-all duration-300 shadow-[0_0_10px_#fde047]" style="background: linear-gradient(90deg, #ca8a04, #fde047);"></div>
                </div>
            </div>

            <button id="ultBtn" class="mt-2 bg-slate-900/80 border-2 border-slate-600 text-gray-500 font-black py-2 px-4 rounded-xl mha-title text-xl md:text-2xl transition-all shadow-lg backdrop-blur-sm pointer-events-auto">
                ULTIMATE (ESPAÇO)
            </button>
        </div>
       
        <!-- COMBO HUD -->
        <div class="flex flex-col items-center w-1/3 pt-2">
            <div id="comboContainer" class="hidden flex-col items-center transform transition-transform">
                <div id="comboText" class="text-3xl md:text-5xl hud-text text-orange-500 italic drop-shadow-[0_0_10px_rgba(249,115,22,0.8)]">COMBO x1</div>
                <div class="w-32 h-2 mt-1 bg-slate-800 rounded-full overflow-hidden border border-slate-600">
                    <div id="comboBar" class="h-full bg-orange-500 w-full shadow-[0_0_8px_#f97316]"></div>
                </div>
            </div>
        </div>

        <div class="flex flex-col items-end gap-2 w-1/3">
            <div class="text-3xl md:text-4xl hud-text text-red-500 flex gap-1 drop-shadow-[0_0_8px_rgba(239,68,68,0.8)]" id="livesDisplay">
                ❤️❤️❤️
            </div>
            <div id="activeBoosts" class="flex gap-2 text-xl md:text-2xl drop-shadow-md h-8"></div>
        </div>
    </div>

    <!-- HUD do Boss -->
    <div id="bossHUD" class="absolute top-16 left-1/2 transform -translate-x-1/2 w-3/4 max-w-lg hidden z-10 pointer-events-none flex flex-col items-center">
        <div class="text-center text-purple-400 font-bold mha-title text-2xl mb-1 drop-shadow-[0_0_5px_rgba(168,85,247,0.8)]">NOMU</div>
        <div class="w-full h-4 bg-slate-900 border-2 border-purple-500 rounded-full overflow-hidden shadow-[0_0_15px_rgba(168,85,247,0.5)]">
            <div id="bossHpBar" class="h-full bg-gradient-to-r from-purple-800 to-purple-400 transition-all duration-100" style="width: 100%"></div>
        </div>
    </div>

    <!-- Notificações de Desbloqueio -->
    <div id="unlockNotification" class="absolute top-20 left-1/2 transform -translate-x-1/2 bg-yellow-500 text-black border-4 border-yellow-200 px-6 py-3 rounded-2xl z-50 mha-title text-2xl shadow-[0_0_30px_rgba(253,224,71,0.8)] transition-all duration-500 -translate-y-24 opacity-0 pointer-events-none">
        🎉 NOVO HERÓI DESBLOQUEADO! 🎉
    </div>

    <!-- Ecrã Inicial -->
    <div id="startScreen" class="absolute inset-0 flex flex-col items-center justify-start bg-slate-950/90 z-20 backdrop-blur-md transition-opacity duration-300 overflow-y-auto py-8">
        <h1 class="text-5xl md:text-6xl text-white mha-title mb-1 text-center px-4 mt-2 drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">TREINO <span class="text-yellow-400">PLUS ULTRA</span></h1>
       
        <div class="mt-4 mb-4 w-full max-w-4xl px-4">
            <h2 class="text-xl mha-title text-cyan-400 mb-2 text-center">1. ESCOLHE A MISSÃO</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4 justify-center">
                <button class="custom-card mode-card selected p-4 rounded-xl cursor-pointer text-center" data-mode="combat">
                    <div class="text-4xl mb-2">⚔️</div>
                    <div class="font-bold mha-title text-xl text-red-400">COMBATE</div>
                    <div class="text-xs text-gray-400 mt-1">Sobrevive infinitamente.<br><span id="hs-combat" class="text-yellow-500">Recorde: 0</span></div>
                </button>
                <button class="custom-card mode-card p-4 rounded-xl cursor-pointer text-center" data-mode="rescue">
                    <div class="text-4xl mb-2">⛑️</div>
                    <div class="font-bold mha-title text-xl text-emerald-400">RESGATE</div>
                    <div class="text-xs text-gray-400 mt-1">Salva civis em queda.<br><span id="hs-rescue" class="text-yellow-500">Recorde: 0</span></div>
                </button>
                <button class="custom-card mode-card p-4 rounded-xl cursor-pointer text-center" data-mode="boss">
                    <div class="text-4xl mb-2">👹</div>
                    <div class="font-bold mha-title text-xl text-purple-400">CHEFÃO</div>
                    <div class="text-xs text-gray-400 mt-1">Derrota o terrível Nomu.</div>
                </button>
            </div>
        </div>

        <!-- Dificuldade do Boss -->
        <div id="bossDifficultyContainer" class="hidden mb-4 w-full max-w-2xl px-4 animate-fade-in">
            <h2 class="text-lg mha-title text-purple-400 mb-2 text-center">NÍVEL DE AMEAÇA DO NOMU</h2>
            <div class="flex justify-center gap-2 md:gap-4">
                <button class="diff-btn flex-1 py-2 rounded-lg bg-slate-800 text-gray-300 font-bold" data-diff="easy">FÁCIL</button>
                <button class="diff-btn selected-normal flex-1 py-2 rounded-lg bg-slate-800 text-gray-300 font-bold" data-diff="normal">NORMAL</button>
                <button class="diff-btn flex-1 py-2 rounded-lg bg-slate-800 text-gray-300 font-bold" data-diff="hard">DIFÍCIL</button>
            </div>
        </div>

        <div class="mb-6 w-full max-w-5xl px-4">
            <h2 class="text-xl mha-title text-yellow-400 mb-2 text-center">2. SELECIONA O TEU HERÓI</h2>
            <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3 pb-2 px-2" id="heroGrid">
                <!-- Gerado por JS -->
            </div>
        </div>

        <button id="startBtn" class="px-12 py-5 bg-gradient-to-b from-yellow-300 to-yellow-600 hover:from-yellow-200 hover:to-yellow-500 text-black font-black text-4xl rounded-2xl shadow-[0_10px_0_#854d0e] hover:translate-y-[5px] hover:shadow-[0_5px_0_#854d0e] transition-all mha-title mt-2 mb-8">
            INICIAR MISSÃO!
        </button>
    </div>

    <!-- Ecrã de Fim de Jogo -->
    <div id="gameOverScreen" class="absolute inset-0 flex flex-col items-center justify-center bg-black/90 z-30 hidden backdrop-blur-xl">
        <h1 class="text-6xl md:text-8xl text-red-600 mha-title mb-2 text-center drop-shadow-[0_0_30px_rgba(220,38,38,0.9)]" id="endTitle">CAÍSTE!</h1>
        <p class="text-xl text-gray-400 mb-6 font-bold" id="gameOverSub">A Missão Falhou.</p>
       
        <div class="bg-slate-900 border-2 border-slate-700 p-6 md:p-8 rounded-3xl shadow-[0_0_40px_rgba(0,0,0,1)] mb-8 text-center">
            <div class="text-lg hud-text text-gray-500">PONTUAÇÃO FINAL</div>
            <div class="text-6xl md:text-7xl hud-text text-yellow-400 drop-shadow-[0_0_20px_rgba(253,224,71,0.6)]" id="finalScore">0</div>
            <div id="highScoreAlert" class="text-emerald-400 font-bold mt-2 hidden animate-pulse">NOVO RECORDE!</div>
        </div>
       
        <button id="restartBtn" class="px-10 py-4 bg-gradient-to-b from-green-400 to-green-700 hover:from-green-300 hover:to-green-600 text-white font-black text-2xl md:text-3xl rounded-xl shadow-[0_8px_0_#14532d] hover:shadow-[0_4px_0_#14532d] hover:translate-y-[4px] transition-all mha-title">
            VOLTAR AO MENU
        </button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // [Full Treino Plus Ultra game script - see original file for complete implementation]
        alert("Treino Plus Ultra loaded! Full interactive game available.");
    </script>
</body>
</html>
