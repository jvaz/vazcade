                            if (proj.type !== 'meteor' && proj.type !== 'large') projectiles.splice(pIndex, 1); // Large proj pierces
                            createParticles(proj.x, proj.y, proj.color, 5, 2);
                            if(enemy.takeDamage(proj.damage, proj.type, proj.vy)) {
                                createParticles(enemy.x, enemy.y, enemy.isBrute ? '#f43f5e':'#a855f7', 15, 4, 'spark');
                                addCombo();
                                const basePts = enemy.isBrute ? 50 : 10;
                                const finalPts = addScore(basePts);
                                addCoins(enemy.isBrute ? 15 : 4);
                                texts.push(new FloatingText(enemy.x, enemy.y, `+${finalPts}`, '#fff', 20));
                                triggerShake(enemy.isBrute ? 15:3, enemy.isBrute ? 8:2);
                                enemies.splice(eIndex, 1);
                            }
                        }
                    });
                   
                    if (checkCollision(player, enemy)) {
                        player.hit();
                    } else if (enemy.y - enemy.radius > canvas.height) {
                        enemies.splice(eIndex, 1);
                        resetCombo();
                    }
                });
            } else if (selectedMode === 'rescue') {
                debrisList.forEach((debris, dIndex) => {
                    debris.update();
                    debris.draw();
                    projectiles.forEach((proj, pIndex) => {
                        if(proj.type !== 'boss' && checkCollision(proj, debris)) {
                            if(proj.type !== 'meteor' && proj.type !== 'large') projectiles.splice(pIndex,1);
                            createParticles(proj.x, proj.y, '#94a3b8', 5,2);
                        }
                    });
                    if (checkCollision(player, debris)) {
                        player.hit();
                    } else if (debris.y - debris.radius > canvas.height) {
                        debrisList.splice(dIndex, 1);
                    }
                });

                civilians.forEach((civil, cIndex) => {
                    civil.update();
                    civil.draw();
                    if (checkCollision(player, civil)) {
                        civilians.splice(cIndex, 1);
                        addCombo();
                        const pts = addScore(50);
                        addCoins(15);
                        createParticles(civil.x, civil.y, '#60a5fa', 15, 3);
                        texts.push(new FloatingText(civil.x, civil.y-20, `SALVO! +${pts}`, '#60a5fa', 24));
                        triggerShake(3, 2);
                    } else if (civil.y - civil.radius > canvas.height) {
                        civilians.splice(cIndex, 1);
                        resetCombo();
                    }
                });
            } else if (selectedMode === 'boss' && mainBoss) {
                mainBoss.update();
                mainBoss.draw();
               
                projectiles.forEach((proj, pIndex) => {
                    if (proj.type !== 'boss' && checkCollision(proj, mainBoss)) {
                        if (proj.type !== 'meteor' && proj.type !== 'large') projectiles.splice(pIndex, 1);
                        createParticles(proj.x, proj.y, proj.color, 5, 2);
                        addCombo();
                        mainBoss.takeDamage(proj.damage);
                    }
                    if (proj.type === 'boss' && checkCollision(proj, player)) {
                        projectiles.splice(pIndex, 1);
                        player.hit();
                    }
                });

                if (checkCollision(player, mainBoss)) {
                    player.hit();
                }
            }

            texts.forEach((t, i) => {
                if (t.alpha <= 0) {
                    texts.splice(i,1);
                } else {
                    t.update();
                    t.draw();
                }
            });
            ctx.restore();
            updateHUD();
        }

        restartBtn.addEventListener('click', () => {
            gameOverScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
            hud.classList.add('hidden');
            bossHUD.classList.add('hidden');
            updateMenuUI();
            gameState = 'START';
        });

        startBtn.addEventListener('click', () => {
            if (saveData.unlocked.includes(selectedHeroId) || HERO_CONFIGS[selectedHeroId].req()) {
                initGame();
            }
        });
       
        // Iniciar ecrã
        drawBackground();
       
    </script>
</body>
</html>
